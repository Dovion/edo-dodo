server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 24h
      cookie:
        same-site: lax

spring:
  application:
    name: edo-dodo
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://localhost:27017}
      database: ${DB_NAME:edo_dodo}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  security:
    admin:
      username: admin
      password: 12345
    # Куда вести после входа: / для Docker/nginx, http://localhost:3000 для npm start
    login-success-url: ${APP_LOGIN_SUCCESS_URL:http://localhost:3000/}
  cors:
    allowed-origins: http://localhost:3000,http://localhost,http://localhost:80
  storage:
    url: https://integrations.emergentagent.com/objstore/api/v1/storage
    app-name: edo-case-manager
  uploads-dir: uploads

emergent:
  llm-key: ${EMERGENT_LLM_KEY:}

logging:
  level:
    root: INFO
    ru.lukin: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: INFO